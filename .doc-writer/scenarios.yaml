    scenarios:
      - id: S1
        goal: "I want to install the extension and create my first semantic view over a single table, then query it"
        starting_point: "docs/index.rst"
        persona_relevance: "This is the essential first experience -- a data engineer evaluating the extension needs to get it running and see a basic example end-to-end before investing further time"
        done_when: "I have clear installation instructions, a complete DDL example I can copy-paste, a query example showing results, and I understand what happened at each step"
      - id: S2
        goal: "I want to model a star schema with multiple tables (fact + dimensions), define relationships, and query across them"
        starting_point: "docs/index.rst"
        persona_relevance: "Real analytics workloads involve multiple tables -- a data engineer needs to know how to declare PK/FK relationships and trust that joins are generated correctly"
        done_when: "I have a multi-table CREATE SEMANTIC VIEW example with TABLES, RELATIONSHIPS, DIMENSIONS, and METRICS clauses, and I can see the generated SQL to verify join correctness"
      - id: S3
        goal: "I want to compare this extension's capabilities and syntax with Snowflake and Databricks Semantic Views to decide if it fits my use case"
        starting_point: "docs/index.rst"
        persona_relevance: "Coming from Snowflake/Databricks, I need to understand what maps over, what is different, and what is missing before committing to this tool"
        done_when: "I have a clear feature-by-feature comparison showing syntax differences, supported/unsupported features, and migration guidance for both Snowflake and Databricks"
      - id: S4
        goal: "I want to define a semantic view with pre-aggregated materializations and export it as YAML for version control"
        starting_point: "docs/index.rst"
        persona_relevance: "In production, data engineers need to speed up repeated queries via materializations and manage semantic view definitions as code in version control"
        done_when: "I can define materializations in a semantic view, understand how queries are routed to them, and I can export/import the definition as YAML"
      - id: S5
        goal: "I want to define semi-additive metrics and window function metrics for snapshot data (like account balances) and time-series analysis"
        starting_point: "docs/index.rst"
        persona_relevance: "Financial and inventory data requires semi-additive measures (e.g., last balance per account per month), and window functions enable running totals and period-over-period comparisons -- these are common analytics engineering tasks"
        done_when: "I can write a semantic view with NON ADDITIVE BY metrics, understand when to use them, and define window function metrics with OVER clauses"
