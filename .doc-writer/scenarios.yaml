    scenarios:
      - id: S1
        goal: "I want to install the extension and create my first semantic view over a single table, then query it"
        starting_point: "docs/index.rst"
        persona_relevance: "This is the essential first experience -- a data engineer evaluating the extension needs to get it running and see a basic example end-to-end before investing further time"
        done_when: "I have clear installation instructions, a complete DDL example I can copy-paste, a query example showing results, and I understand what happened at each step"
      - id: S2
        goal: "I want to model a star schema with multiple tables (fact + dimensions), define relationships, and query across them"
        starting_point: "docs/index.rst"
        persona_relevance: "Real analytics workloads involve multiple tables -- a data engineer needs to know how to declare PK/FK relationships and trust that joins are generated correctly"
        done_when: "I have a multi-table CREATE SEMANTIC VIEW example with TABLES, RELATIONSHIPS, DIMENSIONS, and METRICS clauses, and I can see the generated SQL to verify join correctness"
      - id: S3
        goal: "I want to compare this extension's capabilities and syntax with Snowflake Semantic Views to decide if it fits my use case"
        starting_point: "docs/index.rst"
        persona_relevance: "Coming from Snowflake/Databricks, I need to understand what maps over, what is different, and what is missing before committing to this tool"
        done_when: "I have a clear feature-by-feature comparison showing syntax differences, supported/unsupported features, and migration guidance"
      - id: S4
        goal: "I want to inspect and manage the semantic views I have defined -- rename a view, list all views with filtering, and explore what dimensions/metrics/facts a view has"
        starting_point: "docs/index.rst"
        persona_relevance: "In production use, data engineers need to manage their semantic layer catalog: rename views as models evolve, filter the view list when many views exist, and programmatically inspect the model structure to build tooling or documentation"
        done_when: "I can find clear reference for ALTER SEMANTIC VIEW RENAME TO, SHOW SEMANTIC VIEWS with LIKE/STARTS WITH/LIMIT, SHOW SEMANTIC DIMENSIONS/METRICS/FACTS IN <view>, and understand what each returns"
      - id: S5
        goal: "I want to find out which dimensions are safe to query alongside a specific metric in a multi-table view, without triggering a fan trap"
        starting_point: "docs/index.rst"
        persona_relevance: "When building dashboards or BI tool integrations over a complex multi-table semantic view, I need to know programmatically which dimensions can be combined with a given metric -- this is directly addressed by SHOW SEMANTIC DIMENSIONS FOR METRIC"
        done_when: "I have a clear explanation of SHOW SEMANTIC DIMENSIONS IN <view> FOR METRIC <metric>, understand the fan trap filtering logic, and have a working example showing which dimensions are excluded and why"
