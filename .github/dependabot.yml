version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: "rust-toolchain"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      rust-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "duckdb"
          - "libduckdb-sys"
