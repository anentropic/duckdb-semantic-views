name: Fuzz
on:
  push:
    tags-ignore:
      - '**'
    branches:
      - '**'
    paths:
      - 'src/**'
      - 'fuzz/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/Fuzz.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  FUZZ_TIME: 600  # 10 minutes per target
  RUSTUP_TOOLCHAIN: nightly  # override rust-toolchain.toml (cargo-fuzz needs nightly)

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep in sync with fuzz/fuzz_targets/ (all eight targets must be listed —
        # fuzz_yaml_parse and fuzz_parser_override_ffi were missing until 2026-07-02).
        target: [fuzz_json_parse, fuzz_sql_expand, fuzz_query_names, fuzz_ddl_parse, fuzz_yaml_parse, fuzz_parser_override_ffi, fuzz_keyword_body, fuzz_render_roundtrip]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz

      - name: Build fuzz target
        run: cargo fuzz build ${{ matrix.target }}

      - name: Run fuzzer
        run: |
          # libFuzzer refuses to start if the corpus/seeds directories are
          # absent (they are gitignored), exiting instantly — so create them
          # first. Without this, 7 of 8 targets fuzzed nothing yet went green.
          mkdir -p fuzz/corpus/${{ matrix.target }} fuzz/seeds/${{ matrix.target }}
          set +e
          cargo fuzz run ${{ matrix.target }} fuzz/corpus/${{ matrix.target }} fuzz/seeds/${{ matrix.target }} -- -max_total_time=${{ env.FUZZ_TIME }}
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            exit 0
          fi
          # A non-zero exit WITH a crash artifact is a real finding — the
          # "Check for crash artifacts" step (and its uploader/issue/fail
          # steps) owns that path, so let this step succeed and hand off.
          if find fuzz/artifacts/${{ matrix.target }} -type f \( -name 'crash-*' -o -name 'oom-*' -o -name 'timeout-*' -o -name 'slow-unit-*' \) 2>/dev/null | grep -q .; then
            echo "Fuzzer exited $rc with crash artifacts present — handled by crash-detection steps."
            exit 0
          fi
          # Non-zero with NO artifacts means the fuzzer failed to start (bad
          # corpus dir, build/link error, OOM before writing). Fail loudly
          # instead of masking it with a trailing || true.
          echo "::error::cargo fuzz run ${{ matrix.target }} failed to start (exit $rc) with no crash artifacts"
          exit $rc

      - name: Check for crash artifacts
        id: check
        run: |
          if find fuzz/artifacts/${{ matrix.target }} -type f \( -name 'crash-*' -o -name 'oom-*' -o -name 'timeout-*' -o -name 'slow-unit-*' \) 2>/dev/null | grep -q .; then
            echo "crash_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "crash_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload crash artifacts
        if: steps.check.outputs.crash_found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: crash-${{ matrix.target }}-${{ github.sha }}
          path: fuzz/artifacts/${{ matrix.target }}/

      - name: Open issue on crash
        if: steps.check.outputs.crash_found == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Fuzz crash: ${{ matrix.target }}`,
              body: [
                'Fuzzing found a crash in `${{ matrix.target }}`.',
                '',
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Download the crash artifact and reproduce locally:',
                '```bash',
                '# 1. Download the artifact from the Actions run linked above',
                '#    (Artifacts section at the bottom of the run page)',
                '# 2. Unzip and reproduce:',
                'cargo +nightly fuzz run ${{ matrix.target }} fuzz/artifacts/${{ matrix.target }}/<crash-file>',
                '```',
              ].join('\n'),
              labels: ['bug', 'fuzzing']
            })

      - name: Fail job on crash
        if: steps.check.outputs.crash_found == 'true'
        run: |
          echo "::error::Fuzzer found a crash in ${{ matrix.target }} — see uploaded artifacts"
          exit 1
