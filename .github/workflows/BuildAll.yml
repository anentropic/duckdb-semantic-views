name: "Build Extension: All Platforms"

on:
  push:
    branches: ["main"]
    # Skip the full-matrix build for documentation/text-only changes (the docs
    # site itself is validated by Docs.yml / DocsCheck.yml). A commit that also
    # touches any non-doc file still triggers a build. Keep this list in sync
    # with BuildQuick / CodeQuality / IntegrationChecks.
    paths-ignore:
      - '**/*.md'
      - '_notes/**'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries (all platforms)
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    # IMPORTANT: The @tag below must match the version in .duckdb-version (currently v1.5.4).
    # GitHub Actions 'uses:' does not support dynamic values, so update this manually
    # whenever .duckdb-version changes.
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.4
    with:
      duckdb_version: v1.5.4
      ci_tools_version: v1.5.4
      extension_name: semantic_views
      extra_toolchains: 'rust;python3'
      exclude_archs: 'linux_amd64_musl;linux_arm64_musl;windows_arm64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
