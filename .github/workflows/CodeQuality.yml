name: Code Quality

on:
  push:
    tags-ignore:
      - '**'
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format, and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Pre-install the toolchain pinned in rust-toolchain.toml before any
      # cargo command (every fmt/clippy/llvm-cov step below runs under it), so
      # cargo's flake-prone lazy rustup install is a no-op. See the composite
      # action for the full rationale.
      - name: Install pinned Rust toolchain
        uses: ./.github/actions/setup-pinned-rust

      # The sqllogictest runner executes ONLY files named in TEST_LIST; a
      # .test file missing from it is silently skipped. Mirrors `just check-test-list`.
      - name: Check test/sql/TEST_LIST is in sync with test/sql/*.test
        run: |
          if ! diff <(find test/sql -maxdepth 1 -name '*.test' | sort) <(sort test/sql/TEST_LIST); then
            echo "::error::test/sql/TEST_LIST is out of sync with test/sql/*.test ('<' = on disk only, '>' = in TEST_LIST only)"
            exit 1
          fi

      - name: Check formatting (rustfmt)
        run: cargo fmt --check

      - name: Clippy (pedantic lints, deny warnings)
        run: cargo clippy -- -D warnings

      # Also lint the `extension`-gated FFI layer, which the default-feature
      # clippy above never compiles. SV_SKIP_CPP_BUILD makes build.rs skip the
      # ~25 MB DuckDB amalgamation + C++ shim compile: clippy only type-checks
      # (never links the cdylib), so the C++ half is irrelevant here and the
      # step needs no amalgamation download.
      - name: Clippy (extension feature, deny warnings)
        run: SV_SKIP_CPP_BUILD=1 cargo clippy --no-default-features --features extension -- -D warnings

      # T-12 (code-review 2026-07-16): doctests run in no other job — the
      # coverage step below uses cargo-nextest, which skips them entirely. Run
      # the default-feature doctests so their examples cannot silently rot, and
      # the `extension`-gated FFI doctests separately: the load-bearing one is a
      # `compile_fail` ABI-safety guard in src/ddl/read_ffi.rs that only
      # type-checks (SV_SKIP_CPP_BUILD skips the C++ build; a compile_fail
      # doctest never links). It is scoped to `read_ffi` because the other
      # doctests assume the default `duckdb` feature and won't compile here.
      - name: Doctests (default features)
        run: cargo test --doc

      - name: FFI doctests (extension feature, compile_fail ABI guard)
        run: SV_SKIP_CPP_BUILD=1 cargo test --doc --no-default-features --features extension read_ffi

      # Pinned to a commit SHA (not the floating @v2) because the v2.1.0/v2.1.1
      # releases (2026-07-13) bundle cargo-deny 0.20.2, whose CLI refactor drops
      # the `--log-level` argument this action still passes — breaking the step
      # with "unrecognized subcommand 'warn'". v2.0.20 bundles cargo-deny 0.19.8,
      # the version CI ran green on through 2026-07-13. Bump deliberately once
      # the action/cargo-deny arg mismatch is resolved upstream.
      - name: cargo-deny (licenses + advisories)
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20 (cargo-deny 0.19.8)

      # `cargo llvm-cov` builds an instrumented copy of the WHOLE crate —
      # including the bundled DuckDB linked by the default-feature `duckdb`
      # dependency — plus every integration test binary into
      # target/llvm-cov-target/. That tree runs right at the edge of the
      # runner's ~14 GB free disk and has failed with "No space left on
      # device". Reclaim the large preinstalled toolchains this job never uses
      # (~25 GB) so the instrumented build has headroom. Inline shell (not a
      # third-party action) to keep the supply-chain surface unchanged.
      - name: Free disk space for the instrumented coverage build
        run: |
          echo "Before:" && df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
                      /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          echo "After:" && df -h /

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      # Note: --lib flag may be needed for cdylib crates. If this fails, try:
      #   cargo llvm-cov --lib nextest --fail-under-lines 80
      - name: Coverage check (80% minimum)
        run: cargo llvm-cov nextest --fail-under-lines 80
