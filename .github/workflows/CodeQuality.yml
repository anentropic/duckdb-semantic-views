name: Code Quality

on:
  push:
    tags-ignore:
      - '**'
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format, and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Pre-install the toolchain pinned in rust-toolchain.toml (single source
      # of truth — read the channel from the file so a Dependabot bump can't
      # drift) BEFORE any cargo command. Every fmt/clippy/llvm-cov step below
      # runs under the pinned toolchain via rust-toolchain.toml; letting cargo
      # lazily trigger its rustup install races on the runner image's
      # preinstalled `~/.cargo/bin/cargo-clippy` proxy and intermittently dies
      # with "detected conflict: 'bin/cargo-clippy'" while rustup rolls back a
      # partial install (the #72 / #76 DuckLake flake). Uninstall-then-install
      # clears any partial copy and completes here, so cargo's lazy path is a
      # clean no-op.
      - name: Pre-install pinned Rust toolchain (avoid lazy-install race)
        run: |
          channel="$(grep -oP '^\s*channel\s*=\s*"\K[^"]+' rust-toolchain.toml)"
          echo "Pinned toolchain from rust-toolchain.toml: $channel"
          rustup toolchain uninstall "$channel" >/dev/null 2>&1 || true
          rustup toolchain install "$channel" --profile minimal \
            --component rustfmt --component clippy --no-self-update

      # The sqllogictest runner executes ONLY files named in TEST_LIST; a
      # .test file missing from it is silently skipped. Mirrors `just check-test-list`.
      - name: Check test/sql/TEST_LIST is in sync with test/sql/*.test
        run: |
          if ! diff <(find test/sql -maxdepth 1 -name '*.test' | sort) <(sort test/sql/TEST_LIST); then
            echo "::error::test/sql/TEST_LIST is out of sync with test/sql/*.test ('<' = on disk only, '>' = in TEST_LIST only)"
            exit 1
          fi

      - name: Check formatting (rustfmt)
        run: cargo fmt --check

      - name: Clippy (pedantic lints, deny warnings)
        run: cargo clippy -- -D warnings

      # Also lint the `extension`-gated FFI layer, which the default-feature
      # clippy above never compiles. SV_SKIP_CPP_BUILD makes build.rs skip the
      # ~25 MB DuckDB amalgamation + C++ shim compile: clippy only type-checks
      # (never links the cdylib), so the C++ half is irrelevant here and the
      # step needs no amalgamation download.
      - name: Clippy (extension feature, deny warnings)
        run: SV_SKIP_CPP_BUILD=1 cargo clippy --no-default-features --features extension -- -D warnings

      - name: cargo-deny (licenses + advisories)
        uses: EmbarkStudios/cargo-deny-action@v2

      # `cargo llvm-cov` builds an instrumented copy of the WHOLE crate —
      # including the bundled DuckDB linked by the default-feature `duckdb`
      # dependency — plus every integration test binary into
      # target/llvm-cov-target/. That tree runs right at the edge of the
      # runner's ~14 GB free disk and has failed with "No space left on
      # device". Reclaim the large preinstalled toolchains this job never uses
      # (~25 GB) so the instrumented build has headroom. Inline shell (not a
      # third-party action) to keep the supply-chain surface unchanged.
      - name: Free disk space for the instrumented coverage build
        run: |
          echo "Before:" && df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
                      /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          echo "After:" && df -h /

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      # Note: --lib flag may be needed for cdylib crates. If this fails, try:
      #   cargo llvm-cov --lib nextest --fail-under-lines 80
      - name: Coverage check (80% minimum)
        run: cargo llvm-cov nextest --fail-under-lines 80
