name: "Build Extension: All Platforms"

on:
  push:
    branches: ["!main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries (all platforms)
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    # IMPORTANT: The @tag below must match the version in .duckdb-version (currently v1.5.0).
    # GitHub Actions 'uses:' does not support dynamic values, so update this manually
    # whenever .duckdb-version changes.
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.0
    with:
      duckdb_version: v1.5.0
      ci_tools_version: v1.5.0
      extension_name: semantic_views
      extra_toolchains: 'rust;python3'
      # Only Linux x86_64 for fast PR feedback — full matrix runs on main branche.
      # Verified arch names from extension-ci-tools/config/distribution_matrix.json.
      exclude_archs: 'linux_arm64;linux_amd64_musl;linux_arm64_musl;osx_amd64;osx_arm64;windows_amd64;windows_arm64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
