name: "Build Extension: Quick (Linux x86_64)"

on:
  push:
    # All branches except main (BuildAll.yml covers main with the full
    # platform matrix). NOTE: this must be `branches-ignore`, not a
    # negative pattern under `branches` — a `branches` filter containing
    # only negative patterns ("!main") matches nothing, which silently
    # disabled this workflow (it had zero runs before 2026-07-02).
    branches-ignore: ["main"]
    # Skip the build + sqllogictest suite for documentation/text-only changes
    # (validated by DocsCheck.yml instead). A commit that also touches any
    # non-doc file still triggers a build. Keep this list in sync with
    # BuildAll / CodeQuality / IntegrationChecks.
    paths-ignore:
      - '**/*.md'
      - '_notes/**'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries (Linux x86_64)
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    # IMPORTANT: The @tag below must match the version in .duckdb-version (currently v1.5.4).
    # GitHub Actions 'uses:' does not support dynamic values, so update this manually
    # whenever .duckdb-version changes.
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.4
    with:
      duckdb_version: v1.5.4
      ci_tools_version: v1.5.4
      extension_name: semantic_views
      extra_toolchains: 'rust;python3'
      # Only Linux x86_64 for fast branch feedback — the full matrix runs on main.
      # Verified arch names from extension-ci-tools/config/distribution_matrix.json.
      exclude_archs: 'linux_arm64;linux_amd64_musl;linux_arm64_musl;osx_amd64;osx_arm64;windows_amd64;windows_arm64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
