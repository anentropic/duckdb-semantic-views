name: Integration Checks

on:
  push:
    tags-ignore:
      - '**'
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ducklake-ci-check:
    name: DuckLake integration test (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build extension
        run: make configure debug

      - name: Install uv
        run: pip install uv

      - name: Run DuckLake CI integration test
        run: uv run test/integration/test_ducklake_ci.py
        env:
          SEMANTIC_VIEWS_EXTENSION_PATH: build/debug/semantic_views.duckdb_extension

  python-integration:
    name: Python integration suites (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build extension
        run: make configure debug

      - name: Install uv
        run: pip install uv

      - name: Install just
        uses: taiki-e/install-action@just

      # Runs the same suite list as local `just test-all` (minus test-rust /
      # test-sql / test-ducklake-ci, which have their own CI jobs). The list
      # itself lives in the Justfile's `test-integration` recipe so local dev
      # and CI cannot drift.
      - name: Run Python integration suites
        run: just test-integration

  docs-check:
    name: Docs build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build docs (warnings as errors)
        run: uv run --project docs sphinx-build -b html -W docs docs/_build/html
