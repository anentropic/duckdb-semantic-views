name: Integration Checks

on:
  push:
    tags-ignore:
      - '**'
    branches:
      - '**'
    # Skip the DuckLake + Python integration builds for documentation/text-only
    # changes (they build the debug extension and run the Python suites, which
    # docs changes cannot affect). The docs build check runs separately in
    # DocsCheck.yml so text/markdown changes are still validated. Keep this list
    # in sync with BuildAll / BuildQuick / CodeQuality.
    paths-ignore:
      - '**/*.md'
      - '_notes/**'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ducklake-ci-check:
    name: DuckLake integration test (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Pre-install the toolchain pinned in rust-toolchain.toml before `make`
      # runs cargo, so cargo's flake-prone lazy rustup install is a no-op. See
      # the composite action for the full rationale.
      - name: Install pinned Rust toolchain
        uses: ./.github/actions/setup-pinned-rust

      - name: Build extension
        run: make configure debug

      - name: Install uv
        run: pip install uv

      - name: Run DuckLake CI integration test
        run: uv run test/integration/test_ducklake_ci.py
        env:
          SEMANTIC_VIEWS_EXTENSION_PATH: build/debug/semantic_views.duckdb_extension

  python-integration:
    name: Python integration suites (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Pre-install the toolchain pinned in rust-toolchain.toml before `make`
      # runs cargo, so cargo's flake-prone lazy rustup install is a no-op. See
      # the composite action for the full rationale.
      - name: Install pinned Rust toolchain
        uses: ./.github/actions/setup-pinned-rust

      - name: Build extension
        run: make configure debug

      - name: Install uv
        run: pip install uv

      - name: Install just
        uses: taiki-e/install-action@just

      # Runs the same suite list as local `just test-all` (minus test-rust /
      # test-sql / test-ducklake-ci, which have their own CI jobs). The list
      # itself lives in the Justfile's `test-integration` recipe so local dev
      # and CI cannot drift.
      - name: Run Python integration suites
        run: just test-integration
