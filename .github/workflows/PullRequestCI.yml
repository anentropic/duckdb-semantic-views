name: Pull Request CI

on:
  pull_request:
    branches:
      - main
      - 'release/*'
      - 'gsd/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-fast-check:
    name: Build and test (Linux x86_64)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      duckdb_version: v1.4.4
      ci_tools_version: main
      extension_name: semantic_views
      extra_toolchains: 'rust;python3'
      # Only Linux x86_64 for fast PR feedback — full matrix runs on main/release branches.
      # Verified arch names from extension-ci-tools/config/distribution_matrix.json.
      exclude_archs: 'linux_arm64;linux_amd64_musl;linux_arm64_musl;osx_amd64;osx_arm64;windows_amd64;windows_arm64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'

  ducklake-ci-check:
    name: DuckLake integration test (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Download DuckDB amalgamation
        run: |
          VER=$(cat .duckdb-version)
          curl -sL -o /tmp/libduckdb-src.zip \
            "https://github.com/duckdb/duckdb/releases/download/${VER}/libduckdb-src.zip"
          mkdir -p cpp/include
          unzip -o -j /tmp/libduckdb-src.zip "duckdb.hpp" "duckdb.cpp" -d cpp/include/
          rm -f /tmp/libduckdb-src.zip

      - name: Build extension
        run: cargo build --features extension

      - name: Install uv
        run: pip install uv

      - name: Run DuckLake CI integration test
        run: uv run test/integration/test_ducklake_ci.py
        env:
          SEMANTIC_VIEWS_EXTENSION_PATH: target/debug/semantic_views.duckdb_extension
