name: Pull Request CI

on:
  pull_request:
    branches:
      - main
      - 'release/*'
      - 'gsd/*'
      - 'milestone/*'
      - 'duckdb/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-fast-check:
    name: Build and test (Linux x86_64)
    # IMPORTANT: The @tag below must match the version in .duckdb-version (currently v1.5.0).
    # GitHub Actions 'uses:' does not support dynamic values, so update this manually
    # whenever .duckdb-version changes.
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.0
    with:
      duckdb_version: v1.5.0
      ci_tools_version: v1.5.0
      extension_name: semantic_views
      extra_toolchains: 'rust;python3'
      # Only Linux x86_64 for fast PR feedback — full matrix runs on main/release branches.
      # Verified arch names from extension-ci-tools/config/distribution_matrix.json.
      exclude_archs: 'linux_arm64;linux_amd64_musl;linux_arm64_musl;osx_amd64;osx_arm64;windows_amd64;windows_arm64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'

  ducklake-ci-check:
    name: DuckLake integration test (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build extension
        run: make configure debug

      - name: Install uv
        run: pip install uv

      - name: Run DuckLake CI integration test
        run: uv run test/integration/test_ducklake_ci.py
        env:
          SEMANTIC_VIEWS_EXTENSION_PATH: build/debug/semantic_views.duckdb_extension

  docs-check:
    name: Docs build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build docs (warnings as errors)
        run: uv run --project docs sphinx-build -b html -W docs docs/_build/html
